<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VAPE TECH | 未来烟油实验室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            cursor: crosshair;
        }
        .tech-gradient {
            background: linear-gradient(90deg, #00F2FF 0%, #006AFF 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .scan-line {
            width: 100%;
            height: 2px;
            background: rgba(0, 242, 255, 0.5);
            position: absolute;
            animation: scan 3s linear infinite;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="p-6 flex justify-between items-center border-b border-white/10">
        <div class="text-2xl font-bold tracking-tighter text-cyan-400">VAPE_LAB.SYS</div>
        <div class="hidden md:flex space-x-8 text-sm tracking-widest">
            <a href="#" class="hover:text-cyan-400">COLLECTION</a>
            <a href="#" class="hover:text-cyan-400">LAB_REPORT</a>
            <a href="#" class="hover:text-cyan-400">CONTACT</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="relative h-[80vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 opacity-20">
            <!-- 这里可以放网格背景或视频 -->
            <div class="w-full h-full" style="background-image: radial-gradient(#22D3EE 1px, transparent 1px); background-size: 30px 30px;"></div>
        </div>
        
        <div class="relative z-10 text-center">
            <h1 class="text-7xl md:text-9xl font-bold italic tracking-tighter mb-4">CYBER_JUICE</h1>
            <p class="text-cyan-400 tracking-[0.5em] text-sm md:text-xl">探索数字风味的边界 / EST. 2026</p>
            <div class="mt-10">
                <a href="#products" class="px-8 py-3 border border-cyan-400 text-cyan-400 hover:bg-cyan-400 hover:text-black transition-all duration-500 uppercase tracking-widest text-xs">
                    进入产品矩阵 [Enter]
                </a>
            </div>
        </div>
    </section>

    <!-- 产品展示区 -->
    <section id="products" class="max-w-7xl mx-auto py-20 px-6">
        <h2 class="text-3xl mb-12 flex items-center gap-4">
            <span class="w-12 h-[2px] bg-cyan-400"></span>
            ACTIVE_SAMPLES
        </h2>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- 产品卡片 1 -->
            <div class="glass-card relative overflow-hidden group p-4">
                <div class="scan-line hidden group-hover:block"></div>
                <div class="aspect-[3/4] bg-neutral-900 mb-6 flex items-center justify-center">
                    <!-- 替换为您自己的产品图片 URL -->
                    <span class="text-neutral-700">IMAGE_NOT_FOUND</span>
                </div>
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold">NEON_MINT #01</h3>
                        <span class="text-xs text-cyan-400/50">30ML / 20MG</span>
                    </div>
                    <p class="text-sm text-gray-400">极地液氮萃取，击喉感强烈，纯净薄荷基底。</p>
                    <button onclick="window.open('https://wa.me/你的号码')" class="w-full mt-4 py-3 tech-gradient text-black font-bold text-sm flex items-center justify-center gap-2 hover:opacity-80">
                        WHATSAPP 询价
                    </button>
                </div>
            </div>

            <!-- 产品卡片 2 -->
            <div class="glass-card relative overflow-hidden group p-4 border-cyan-500/30">
                <div class="aspect-[3/4] bg-neutral-900 mb-6 flex items-center justify-center text-neutral-700 italic">PRODUCT_RENDER_02</div>
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold">CYBER_TOBACCO</h3>
                        <span class="text-xs text-cyan-400/50">30ML / 50MG</span>
                    </div>
                    <p class="text-sm text-gray-400">模拟古典烟草香气，融合木质调性，数字复刻体验。</p>
                    <button onclick="window.open('https://wa.me/你的号码')" class="w-full mt-4 py-3 tech-gradient text-black font-bold text-sm flex items-center justify-center gap-2">
                        WHATSAPP 询价
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="p-20 text-center border-t border-white/10">
        <p class="text-gray-600 text-xs">© 2026 VAPE_LAB SYSTEM | ALL RIGHTS RESERVED</p>
    </footer>

</body>
</html>
